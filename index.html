<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>習慣ログ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #f5f0e8;
  color: #3a2e22;
  font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
  padding-bottom: 60px;
}

/* ========== PASSWORD SCREEN ========== */
#password-screen {
  position: fixed; inset: 0;
  background: #f5f0e8;
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  padding: 24px;
}
.pw-box {
  background: #fff;
  border: 1px solid #e0d5c5;
  border-radius: 20px;
  padding: 40px 32px;
  max-width: 360px;
  width: 100%;
  text-align: center;
  box-shadow: 0 4px 24px rgba(100,70,30,0.08);
}
.pw-logo { font-size: 28px; font-weight: 800; color: #8b6f47; letter-spacing: 0.05em; margin-bottom: 8px; }
.pw-sub { font-size: 13px; color: #a0917e; margin-bottom: 28px; }
.pw-input {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid #e0d5c5;
  border-radius: 12px;
  font-size: 16px;
  font-family: inherit;
  background: #faf7f2;
  color: #3a2e22;
  outline: none;
  text-align: center;
  letter-spacing: 0.2em;
  margin-bottom: 12px;
}
.pw-input:focus { border-color: #8b6f47; }
.pw-btn {
  width: 100%;
  padding: 14px;
  background: #8b6f47;
  border: none;
  border-radius: 12px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.pw-btn:hover { background: #7a5f3a; }
.pw-error { font-size: 12px; color: #c0392b; margin-top: 8px; min-height: 18px; }

/* ========== HEADER ========== */
header {
  background: #fff;
  border-bottom: 1px solid #e0d5c5;
  padding: 20px 20px 0;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 1px 8px rgba(100,70,30,0.06);
}
.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  max-width: 600px;
  margin: 0 auto;
}
.logo { font-size: 24px; font-weight: 800; letter-spacing: 0.05em; color: #8b6f47; }
.subtitle { font-size: 12px; color: #a0917e; margin-top: 4px; }
.header-score { text-align: right; }
.score-big { font-size: 40px; font-weight: 800; color: #8b6f47; line-height: 1; }
.score-of { font-size: 16px; color: #a0917e; margin-left: 3px; }
nav { display: flex; gap: 4px; max-width: 600px; margin: 16px auto 0; }
.nav-btn {
  flex: 1; padding: 10px 6px;
  border: none; background: transparent;
  color: #a0917e; font-size: 13px; font-weight: 600;
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.2s; font-family: inherit;
}
.nav-btn.active { color: #8b6f47; border-bottom-color: #8b6f47; }

/* ========== MAIN ========== */
main { max-width: 600px; margin: 0 auto; padding: 24px 16px; }
.section-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; color: #a0917e;
  text-transform: uppercase; margin-bottom: 16px;
}

/* ========== TODAY ========== */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.habit-card {
  display: flex; align-items: center; gap: 10px;
  padding: 14px; background: #fff;
  border: 1.5px solid #e0d5c5; border-radius: 14px;
  cursor: pointer; text-align: left;
  color: #a0917e; font-size: 13px; font-weight: 500;
  transition: all 0.15s; font-family: inherit; width: 100%;
}
.habit-card:hover { border-color: #8b6f47; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(100,70,30,0.1); }
.habit-card.done { background: #fdf6ec; border-color: #c9a96e; color: #3a2e22; }
.card-check {
  width: 22px; height: 22px; min-width: 22px;
  border-radius: 6px; background: #f5f0e8;
  border: 1.5px solid #d5c8b5;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #8b6f47; font-weight: 800;
}
.habit-card.done .card-check { background: #c9a96e; border-color: #c9a96e; color: #fff; }
.today-summary {
  margin-top: 20px; padding: 16px 20px;
  background: #fdf6ec; border: 1.5px solid #c9a96e;
  border-radius: 14px; font-size: 14px; color: #8b6f47; text-align: center;
}

/* ========== MEMO ========== */
.memo-section {
  margin-top: 20px;
}
.memo-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: #a0917e; text-transform: uppercase; margin-bottom: 8px; }
.memo-textarea {
  width: 100%; min-height: 80px;
  padding: 12px 14px;
  background: #fff; border: 1.5px solid #e0d5c5;
  border-radius: 12px; font-size: 14px;
  font-family: inherit; color: #3a2e22;
  resize: vertical; outline: none; line-height: 1.6;
}
.memo-textarea:focus { border-color: #8b6f47; }
.memo-saved { font-size: 11px; color: #a0917e; margin-top: 6px; text-align: right; min-height: 16px; }

/* ========== HISTORY ========== */
.month-group { margin-bottom: 28px; }
.month-label {
  font-size: 12px; font-weight: 700; color: #8b6f47;
  letter-spacing: 0.08em; margin-bottom: 10px;
  padding-bottom: 6px; border-bottom: 1px solid #e0d5c5;
}
.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-card {
  background: #fff; border: 1.5px solid #e0d5c5;
  border-radius: 14px; padding: 14px 16px 12px;
}
.history-card.today { border-color: #c9a96e; }
.history-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.history-date-block { display: flex; align-items: baseline; gap: 6px; }
.history-day { font-size: 18px; font-weight: 800; color: #8b6f47; }
.history-date { font-size: 13px; color: #a0917e; }
.today-badge {
  margin-left: 6px; font-size: 10px;
  background: #8b6f47; color: #fff;
  padding: 2px 7px; border-radius: 99px; font-weight: 700;
}
.history-count-block { display: flex; align-items: baseline; gap: 2px; }
.history-count-num { font-size: 26px; font-weight: 800; color: #3a2e22; }
.history-count-unit { font-size: 12px; color: #a0917e; }
.bar-bg { height: 3px; background: #ede5d8; border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
.history-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.history-tag {
  font-size: 11px; background: #f5f0e8;
  color: #8b6f47; padding: 3px 9px; border-radius: 99px;
  border: 1px solid #e0d5c5;
}
.history-memo {
  margin-top: 8px; padding: 8px 12px;
  background: #faf7f2; border-radius: 8px;
  font-size: 12px; color: #7a6a58; line-height: 1.5;
  border-left: 3px solid #c9a96e;
}
.load-more-btn {
  display: block; width: 100%; padding: 14px;
  background: transparent; border: 1.5px solid #e0d5c5;
  border-radius: 12px; color: #a0917e; font-size: 13px;
  font-weight: 600; cursor: pointer; font-family: inherit;
  margin-top: 4px; transition: all 0.2s;
}
.load-more-btn:hover { border-color: #8b6f47; color: #8b6f47; }

/* ========== EDIT ========== */
.add-row { display: flex; gap: 8px; margin-bottom: 20px; }
.add-row input {
  flex: 1; padding: 12px 14px;
  background: #fff; border: 1.5px solid #e0d5c5;
  border-radius: 12px; color: #3a2e22; font-size: 14px;
  font-family: inherit; outline: none;
}
.add-row input:focus { border-color: #8b6f47; }
.add-btn {
  padding: 12px 18px; background: #8b6f47; border: none;
  border-radius: 12px; color: #fff; font-weight: 700;
  font-size: 13px; cursor: pointer; font-family: inherit;
}
.add-btn:hover { background: #7a5f3a; }
.edit-list { display: flex; flex-direction: column; gap: 8px; }
.edit-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; background: #fff;
  border: 1.5px solid #e0d5c5; border-radius: 12px;
  cursor: grab; transition: box-shadow 0.15s;
  user-select: none;
}
.edit-item.dragging { opacity: 0.5; box-shadow: 0 4px 16px rgba(100,70,30,0.15); }
.edit-item.drag-over { border-color: #8b6f47; background: #fdf6ec; }
.drag-handle { color: #c9b89e; font-size: 16px; cursor: grab; padding: 0 2px; }
.edit-num { font-size: 12px; color: #a0917e; width: 20px; text-align: center; }
.edit-text { flex: 1; font-size: 14px; color: #3a2e22; }
.delete-btn {
  background: transparent; border: none; color: #c9b89e;
  cursor: pointer; font-size: 14px; padding: 4px 6px;
  border-radius: 6px; font-family: inherit;
}
.delete-btn:hover { color: #c0392b; }
.empty { color: #a0917e; font-size: 13px; text-align: center; padding: 40px 0; }
.view { display: none; }
.view.active { display: block; }
</style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div id="password-screen">
  <div class="pw-box">
    <div class="pw-logo">習慣ログ</div>
    <div class="pw-sub">パスワードを入力してください</div>
    <input class="pw-input" type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPassword()">
    <button class="pw-btn" onclick="checkPassword()">ログイン</button>
    <div class="pw-error" id="pw-error"></div>
  </div>
</div>

<header>
  <div class="header-inner">
    <div>
      <div class="logo">習慣ログ</div>
      <div class="subtitle" id="subtitle"></div>
    </div>
    <div class="header-score">
      <span class="score-big" id="score-big">0</span>
      <span class="score-of" id="score-of">/ 0</span>
    </div>
  </div>
  <nav>
    <button class="nav-btn active" onclick="switchView('today')">今日</button>
    <button class="nav-btn" onclick="switchView('history')">履歴</button>
    <button class="nav-btn" onclick="switchView('edit')">習慣を編集</button>
  </nav>
</header>

<main>
  <!-- TODAY -->
  <div id="view-today" class="view active">
    <div class="section-label">今日やったことを選択</div>
    <div class="grid" id="habit-grid"></div>
    <div class="empty" id="today-empty" style="display:none">習慣がまだありません。「習慣を編集」から追加してください。</div>
    <div class="today-summary" id="today-summary" style="display:none"></div>
    <div class="memo-section">
      <div class="memo-label">今日のメモ</div>
      <textarea class="memo-textarea" id="memo-textarea" placeholder="今日の一言メモ（任意）" oninput="saveMemo()"></textarea>
      <div class="memo-saved" id="memo-saved"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="view-history" class="view">
    <div id="history-container"></div>
    <button class="load-more-btn" onclick="loadMore()">さらに30日前を表示 ↓</button>
  </div>

  <!-- EDIT -->
  <div id="view-edit" class="view">
    <div class="section-label">習慣リストを編集</div>
    <div class="add-row">
      <input type="text" id="new-habit-input" placeholder="新しい習慣を入力..." onkeydown="if(event.key==='Enter')addHabit()">
      <button class="add-btn" onclick="addHabit()">追加</button>
    </div>
    <div class="edit-list" id="edit-list"></div>
    <div class="empty" id="edit-empty" style="display:none">習慣がありません。上から追加してください。</div>
  </div>
</main>

<script>
// ========== PASSWORD ==========
const PASSWORD = "habit2024"; // ← ここを好きなパスワードに変更してください

function checkPassword() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    localStorage.setItem('habit_auth', 'true');
    document.getElementById('password-screen').style.display = 'none';
    init();
  } else {
    document.getElementById('pw-error').textContent = 'パスワードが違います';
    document.getElementById('pw-input').value = '';
  }
}

function checkAuth() {
  if (localStorage.getItem('habit_auth') === 'true') {
    document.getElementById('password-screen').style.display = 'none';
    init();
  }
}

// ========== DATA ==========
const DAYS_JA = ["日","月","火","水","木","金","土"];
const DEFAULT_HABITS = ["朝の運動","読書","瞑想","日記を書く","水を2L飲む","ストレッチ","英語の勉強","早起き (7時前)","SNSを1時間以内に抑える","感謝を3つ書く"];

let habits = [];
let records = {};
let memos = {};
let historyDays = 30;

function loadData() {
  habits = JSON.parse(localStorage.getItem('habits') || 'null') || DEFAULT_HABITS;
  records = JSON.parse(localStorage.getItem('records') || '{}');
  memos = JSON.parse(localStorage.getItem('memos') || '{}');
}

function save() {
  localStorage.setItem('habits', JSON.stringify(habits));
  localStorage.setItem('records', JSON.stringify(records));
  localStorage.setItem('memos', JSON.stringify(memos));
}

function toDateKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function getTodayKey() { return toDateKey(new Date()); }

function getPastDays(count) {
  const days = [];
  for (let i = 0; i < count; i++) {
    const d = new Date(); d.setDate(d.getDate() - i); days.push(d);
  }
  return days;
}

function groupByMonth(dates) {
  const groups = []; let current = null;
  for (const date of dates) {
    const label = `${date.getFullYear()}年${date.getMonth()+1}月`;
    if (!current || current.label !== label) { current = { label, dates: [] }; groups.push(current); }
    current.dates.push(date);
  }
  return groups;
}

function getDoneCount(dateKey) {
  const done = new Set(records[dateKey] || []);
  return habits.filter(h => done.has(h)).length;
}

// ========== VIEWS ==========
function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  const idx = ['today','history','edit'].indexOf(v);
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if (v === 'history') renderHistory();
  if (v === 'edit') renderEdit();
  if (v === 'today') renderToday();
}

function renderHeader() {
  const todayKey = getTodayKey();
  const todayDone = new Set(records[todayKey] || []);
  document.getElementById('score-big').textContent = todayDone.size;
  document.getElementById('score-of').textContent = '/ ' + habits.length;
  const now = new Date();
  document.getElementById('subtitle').textContent = now.toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric',weekday:'short'});
}

function renderToday() {
  const todayKey = getTodayKey();
  const todayDone = new Set(records[todayKey] || []);
  const grid = document.getElementById('habit-grid');
  grid.innerHTML = '';
  document.getElementById('today-empty').style.display = habits.length === 0 ? 'block' : 'none';
  habits.forEach(habit => {
    const done = todayDone.has(habit);
    const btn = document.createElement('button');
    btn.className = 'habit-card' + (done ? ' done' : '');
    btn.innerHTML = `<span class="card-check">${done ? '✓' : ''}</span><span>${habit}</span>`;
    btn.onclick = () => toggleHabit(habit);
    grid.appendChild(btn);
  });
  const summary = document.getElementById('today-summary');
  if (todayDone.size > 0) {
    summary.style.display = 'block';
    summary.innerHTML = `今日は <strong>${todayDone.size}個</strong> の習慣を達成 🎉`;
  } else {
    summary.style.display = 'none';
  }
  // memo
  const ta = document.getElementById('memo-textarea');
  ta.value = memos[todayKey] || '';
  document.getElementById('memo-saved').textContent = '';
  renderHeader();
}

function toggleHabit(habit) {
  const todayKey = getTodayKey();
  const daySet = new Set(records[todayKey] || []);
  if (daySet.has(habit)) daySet.delete(habit); else daySet.add(habit);
  records[todayKey] = Array.from(daySet);
  save(); renderToday();
}

let memoTimer = null;
function saveMemo() {
  clearTimeout(memoTimer);
  memoTimer = setTimeout(() => {
    const todayKey = getTodayKey();
    memos[todayKey] = document.getElementById('memo-textarea').value;
    save();
    document.getElementById('memo-saved').textContent = '保存しました';
    setTimeout(() => { document.getElementById('memo-saved').textContent = ''; }, 2000);
  }, 800);
}

function renderHistory() {
  const todayKey = getTodayKey();
  const container = document.getElementById('history-container');
  container.innerHTML = '';
  groupByMonth(getPastDays(historyDays)).forEach(group => {
    const groupEl = document.createElement('div');
    groupEl.className = 'month-group';
    groupEl.innerHTML = `<div class="month-label">${group.label}</div>`;
    const listEl = document.createElement('div');
    listEl.className = 'history-list';
    group.dates.forEach(date => {
      const key = toDateKey(date);
      const count = getDoneCount(key);
      const total = habits.length;
      const pct = total > 0 ? (count / total) * 100 : 0;
      const isToday = key === todayKey;
      const dayDone = new Set(records[key] || []);
      const barColor = pct >= 80 ? '#a8c5a0' : pct >= 40 ? '#c9a96e' : pct > 0 ? '#dfc49a' : 'transparent';
      const doneTags = habits.filter(h => dayDone.has(h)).map(h => `<span class="history-tag">${h}</span>`).join('');
      const memo = memos[key] ? `<div class="history-memo">${memos[key].replace(/\n/g,'<br>')}</div>` : '';
      const card = document.createElement('div');
      card.className = 'history-card' + (isToday ? ' today' : '');
      card.innerHTML = `
        <div class="history-top">
          <div class="history-date-block">
            <span class="history-day">${DAYS_JA[date.getDay()]}</span>
            <span class="history-date">${date.getMonth()+1}/${date.getDate()}${isToday ? '<span class="today-badge">今日</span>' : ''}</span>
          </div>
          <div class="history-count-block">
            <span class="history-count-num">${count}</span>
            <span class="history-count-unit">個</span>
          </div>
        </div>
        ${total > 0 ? `<div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${barColor}"></div></div>` : ''}
        ${count > 0 ? `<div class="history-tags">${doneTags}</div>` : ''}
        ${memo}
      `;
      listEl.appendChild(card);
    });
    groupEl.appendChild(listEl);
    container.appendChild(groupEl);
  });
}

function loadMore() { historyDays += 30; renderHistory(); }

// ========== EDIT + DRAG ==========
let dragSrc = null;

function renderEdit() {
  const list = document.getElementById('edit-list');
  list.innerHTML = '';
  document.getElementById('edit-empty').style.display = habits.length === 0 ? 'block' : 'none';
  habits.forEach((h, i) => {
    const item = document.createElement('div');
    item.className = 'edit-item';
    item.draggable = true;
    item.dataset.index = i;
    item.innerHTML = `
      <span class="drag-handle">⠿</span>
      <span class="edit-num">${i+1}</span>
      <span class="edit-text">${h}</span>
      <button class="delete-btn" onclick="removeHabit(${i})">✕</button>
    `;
    item.addEventListener('dragstart', e => {
      dragSrc = i;
      setTimeout(() => item.classList.add('dragging'), 0);
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      document.querySelectorAll('.edit-item').forEach(el => el.classList.remove('drag-over'));
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      document.querySelectorAll('.edit-item').forEach(el => el.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });
    item.addEventListener('drop', e => {
      e.preventDefault();
      const targetIdx = parseInt(item.dataset.index);
      if (dragSrc !== null && dragSrc !== targetIdx) {
        const moved = habits.splice(dragSrc, 1)[0];
        habits.splice(targetIdx, 0, moved);
        save(); renderEdit();
      }
    });
    // touch support
    let touchStartY = 0, touchItem = null;
    item.addEventListener('touchstart', e => {
      touchStartY = e.touches[0].clientY;
      touchItem = i;
    }, {passive:true});
    item.addEventListener('touchend', e => {
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dy) > 40) {
        const dir = dy > 0 ? 1 : -1;
        const newIdx = Math.max(0, Math.min(habits.length-1, touchItem + dir));
        if (newIdx !== touchItem) {
          const moved = habits.splice(touchItem, 1)[0];
          habits.splice(newIdx, 0, moved);
          save(); renderEdit();
        }
      }
    }, {passive:true});
    list.appendChild(item);
  });
}

function addHabit() {
  const input = document.getElementById('new-habit-input');
  const t = input.value.trim();
  if (t && !habits.includes(t)) {
    habits.push(t); save(); input.value = '';
    renderEdit(); renderHeader();
  }
}

function removeHabit(i) {
  habits.splice(i, 1); save(); renderEdit(); renderHeader();
}

// ========== INIT ==========
function init() {
  loadData(); renderHeader(); renderToday();
}

checkAuth();
</script>
</body>
</html>
